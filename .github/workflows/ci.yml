name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  payjoin-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Resolve Payjoin submodule SHA
        id: payjoin-sha
        run: echo "sha=$(git -C vendor/rust-payjoin rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache Payjoin dist
        id: dist-cache
        uses: actions/cache@v4
        with:
          path: vendor/rust-payjoin/payjoin-ffi/javascript/dist
          key: payjoin-dist-${{ steps.payjoin-sha.outputs.sha }}-${{ hashFiles('vendor/rust-payjoin/payjoin-ffi/javascript/scripts/generate_bindings.sh', 'vendor/rust-payjoin/payjoin-ffi/javascript/package-lock.json') }}

      - name: Add wasm32 target
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo bin
        if: steps.dist-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-cli-0.2.108

      - name: Install wasm-bindgen-cli
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: |
          if ! command -v wasm-bindgen >/dev/null; then
            cargo install -f wasm-bindgen-cli --version 0.2.108 --locked
          fi

      - name: Cache rust build
        if: steps.dist-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            vendor/rust-payjoin/target
            vendor/rust-payjoin/payjoin-ffi/javascript/src/generated
            vendor/rust-payjoin/payjoin-ffi/javascript/node_modules
          key: payjoin-rust-${{ steps.payjoin-sha.outputs.sha }}-${{ hashFiles('vendor/rust-payjoin/payjoin-ffi/javascript/scripts/generate_bindings.sh', 'vendor/rust-payjoin/payjoin-ffi/javascript/package-lock.json') }}

      - name: Build Payjoin bindings
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: |
          cd vendor/rust-payjoin/payjoin-ffi/javascript
          npm ci --ignore-scripts
          bash ./scripts/generate_bindings.sh

      - name: Upload Payjoin dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: payjoin-dist
          path: vendor/rust-payjoin/payjoin-ffi/javascript/dist
          retention-days: 1

  check:
    needs: payjoin-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Download Payjoin dist artifact
        uses: actions/download-artifact@v4
        with:
          name: payjoin-dist
          path: vendor/rust-payjoin/payjoin-ffi/javascript/dist

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install proxy dependencies
        run: pnpm install --frozen-lockfile
        working-directory: proxy

      - name: Typecheck proxy
        run: pnpm typecheck
        working-directory: proxy

      - name: Test proxy
        run: pnpm test
        working-directory: proxy
