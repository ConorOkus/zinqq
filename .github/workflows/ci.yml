name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  payjoin-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: {}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Resolve Payjoin submodule SHA
        id: payjoin-sha
        run: echo "sha=$(git -C vendor/rust-payjoin rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache Payjoin bindings
        id: dist-cache
        uses: actions/cache@v4
        with:
          path: |
            vendor/rust-payjoin/payjoin-ffi/javascript/dist
            vendor/rust-payjoin/payjoin-ffi/javascript/src/generated
          key: payjoin-bindings-${{ steps.payjoin-sha.outputs.sha }}-${{ hashFiles('scripts/build-payjoin-bindings.sh', 'vendor/rust-payjoin/payjoin-ffi/javascript/package-lock.json') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-cli-0.2.108

      - name: Cache rust build
        if: steps.dist-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            vendor/rust-payjoin/target
            vendor/rust-payjoin/payjoin-ffi/javascript/src/generated
            vendor/rust-payjoin/payjoin-ffi/javascript/node_modules
          key: payjoin-rust-${{ steps.payjoin-sha.outputs.sha }}-${{ hashFiles('scripts/build-payjoin-bindings.sh', 'vendor/rust-payjoin/payjoin-ffi/javascript/package-lock.json') }}

      - name: Build Payjoin bindings
        if: steps.dist-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-payjoin-bindings.sh

      - name: Upload Payjoin bindings artifact
        uses: actions/upload-artifact@v4
        with:
          name: payjoin-bindings
          # Upstream's dist/index.web.js does `import './../src/generated/payjoin'`
          # — relative paths that escape dist/. We must ship both directories so
          # the consumer build can resolve them. Common ancestor is the repo root,
          # so the artifact preserves the full vendor/.../{dist,src/generated} layout.
          path: |
            vendor/rust-payjoin/payjoin-ffi/javascript/dist
            vendor/rust-payjoin/payjoin-ffi/javascript/src/generated
          retention-days: 1

  check:
    needs: payjoin-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Download Payjoin bindings artifact
        uses: actions/download-artifact@v4
        with:
          name: payjoin-bindings
          # upload-artifact@v4 uses the lowest common ancestor of the upload
          # paths as the archive root. For our two paths the LCA is the
          # vendored javascript dir; the archive contains dist/... and
          # src/generated/... relative to that. Extract here to restore both
          # subdirs to their original locations.
          path: vendor/rust-payjoin/payjoin-ffi/javascript

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install proxy dependencies
        run: pnpm install --frozen-lockfile
        working-directory: proxy

      - name: Typecheck proxy
        run: pnpm typecheck
        working-directory: proxy

      - name: Test proxy
        run: pnpm test
        working-directory: proxy
